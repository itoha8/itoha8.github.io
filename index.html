<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>八曜日診断</title>
<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #f5f5f5;
}
.box {
  background: white;
  padding: 30px;
  margin: 50px auto;
  width: 300px;
  border-radius: 10px;
}
button {
  padding: 10px 20px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>八曜日診断</h2>
  <p>生年月日を入力してください</p>

  <input type="date" id="birth"><br><br>
  <button onclick="check()">診断する</button>

  <h3 id="result"></h3>
</div>

<script>
function check() {
  const birth = new Date(document.getElementById("birth").value);
  const day = birth.getDay();

  const result = [
    "日曜日生まれ",
    "月曜日生まれ",
    "火曜日生まれ",
    "水曜日生まれ",
    "木曜日生まれ",
    "金曜日生まれ",
    "土曜日生まれ"
  ];

  document.getElementById("result").innerText = result[day];
}
</script>

</body>
</html>
